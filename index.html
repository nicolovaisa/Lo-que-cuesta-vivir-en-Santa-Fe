<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora Comunidad: Costo de Vida Santa Fe</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        :root {
            --comunidad-violeta: #3D1488;
            --comunidad-fucsia: #EF3C6B;
            --bg-page: var(--comunidad-violeta);
            --bg-container: #FFFFFF;
        }

        body { 
            font-family: 'Montserrat', sans-serif; 
            background-color: var(--bg-page); 
            padding: 20px; 
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .main-header {
            text-align: center;
            margin-bottom: 30px;
            width: 100%;
            max-width: 480px;
        }
        .main-header img {
            max-width: 150px;
            height: auto;
            margin-bottom: 15px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
        .main-header h1 {
            color: white;
            font-weight: 800;
            text-transform: uppercase;
            font-size: 1.1rem;
            margin: 0;
            line-height: 1.4;
        }

        .container { 
            max-width: 480px; 
            width: 100%;
            background: var(--bg-container); 
            padding: 35px; 
            border-radius: 25px; 
            box-shadow: 0 20px 50px rgba(0,0,0,0.3); 
            box-sizing: border-box;
            margin-bottom: 50px;
        }

        h2 { text-align: center; color: var(--comunidad-violeta); margin-bottom: 30px; font-weight: 800; text-transform: uppercase; font-size: 1rem; }

        .field { margin-bottom: 20px; }
        label { display: block; font-weight: 600; margin-bottom: 8px; font-size: 14px; color: var(--comunidad-violeta); }
        input, select { width: 100%; padding: 14px; border: 2px solid #e9ecef; border-radius: 12px; font-size: 16px; box-sizing: border-box; font-family: 'Montserrat', sans-serif; }
        
        .button-group { display: flex; gap: 12px; margin-top: 20px; }
        button { flex: 1; padding: 16px; border: none; border-radius: 12px; font-size: 16px; font-weight: 800; cursor: pointer; transition: 0.3s; text-transform: uppercase; font-family: 'Montserrat', sans-serif;}
        .btn-calc { background-color: var(--comunidad-fucsia); color: white; }
        .btn-reset { background-color: #495057; color: white; }

        #placa-resultado {
            display: none;
            margin-top: 30px;
            padding: 40px 20px;
            border-radius: 20px;
            text-align: center;
            background-color: var(--comunidad-violeta); 
            color: white;
            border: 5px solid var(--comunidad-fucsia); 
        }
        .placa-monto { font-size: 3rem; font-weight: 800; color: var(--comunidad-fucsia); margin: 10px 0; }
        .placa-footer { 
            margin-top: 30px; 
            border-top: 1px solid rgba(255,255,255,0.2); 
            padding-top: 20px; 
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .placa-logo-small { max-width: 60px; height: auto; border-radius: 5px; }
        .placa-creditos { text-transform: uppercase; font-weight: 800; font-size: 0.7rem; color: white; text-align: right; }

        #btn-descargar { display: none; width: 100%; background-color: var(--comunidad-fucsia); color: white; margin-top: 20px; padding: 16px; border: none; border-radius: 12px; font-weight: 800; cursor: pointer; text-transform: uppercase; font-family: 'Montserrat', sans-serif;}

        .informes-section { max-width: 1000px; width: 100%; text-align: center; color: white; padding-bottom: 60px; }
        .informes-section h3 { font-size: 1.2rem; margin-bottom: 30px; font-weight: 600; padding: 0 15px; }
        .informes-grid { display: flex; gap: 20px; justify-content: center; flex-wrap: wrap; }
        .informe-card { background: white; color: var(--comunidad-violeta); padding: 25px; border-radius: 20px; flex: 1; min-width: 280px; max-width: 320px; display: flex; flex-direction: column; align-items: center; box-shadow: 0 10px 25px rgba(0,0,0,0.2); }
        .pdf-viewer { width: 100%; height: 300px; border: 1px solid #ddd; border-radius: 10px; margin-bottom: 15px; }
        .btn-download { background: var(--comunidad-fucsia); color: white; text-decoration: none; padding: 12px 15px; border-radius: 10px; font-weight: 800; font-size: 0.8rem; text-transform: uppercase; text-align: center; width: 90%; }
    </style>
</head>
<body>

<header class="main-header">
    <img src="https://raw.githubusercontent.com/nicolovaisa/Lo-que-cuesta-vivir-en-Santa-Fe/main/Informes/Logo%20Comunidad_Con%20Fondo%20Morado.jpg.jpeg" alt="Comunidad">
    <h1>¿Cuánto cuesta vivir en Santa Fe?</h1>
</header>

<div class="container">
    <h2>Herramienta de Comunidad</h2>

    <div class="field">
        <label>Ingresos Mensuales ($)</label>
        <input type="text" id="ingreso" placeholder="Ej: 1.000.000" oninput="formatearMonto(this)">
    </div>

    <div class="field">
        <label>Alquiler</label>
        <select id="alquiler">
            <option value="0">No alquilo / Propio</option>
            <option value="430000">1 ambiente</option>
            <option value="600000">2 ambientes</option>
            <option value="700000">3 ambientes</option>
            <option value="830000">4 ambientes</option>
        </select>
    </div>

    <div class="field">
        <label>Tarifas (Luz, Gas, Agua)</label>
        <select id="tarifas">
            <option value="" disabled selected>Selecciona tu situación</option>
            <option value="141722.99">Con subsidios consumo medio</option>
            <option value="181337.99">Sin subsidios consumo medio</option>
            <option value="186886.99">Con subsidios consumo medio/alto</option>
            <option value="214289.99">Sin subsidios consumo medio/alto</option>
        </select>
    </div>

    <div class="field">
        <label>Prepaga</label>
        <select id="prepaga">
            <option value="0">No tengo / Obra Social</option>
            <option value="106000">Indiv. Económica</option>
            <option value="121916">Indiv. Media</option>
            <option value="144000">Indiv. Alta</option>
            <option value="385454">Fam. Económica</option>
            <option value="500463">Fam. Media</option>
            <option value="764223">Fam. Alta</option>
        </select>
    </div>

    <div class="field">
        <label>Nafta (Litros/Mes)</label>
        <input type="number" id="nafta" placeholder="Cantidad">
    </div>

    <div class="field">
        <label>Colectivo (Boletos/Mes)</label>
        <input type="number" id="colectivo" placeholder="Cantidad">
    </div>

    <div class="button-group">
        <button class="btn-calc" onclick="calcular()">Calcular</button>
        <button class="btn-reset" onclick="location.reload()">Reiniciar</button>
    </div>

    <div id="placa-resultado">
        <div id="placa-titulo" class="placa-titulo" style="font-weight: 800; text-transform: uppercase;"></div>
        <div id="placa-monto" class="placa-monto"></div>
        <div id="placa-porc" style="font-weight: 600; margin-bottom: 20px;"></div>
        <div class="placa-footer">
            <img src="https://raw.githubusercontent.com/nicolovaisa/Lo-que-cuesta-vivir-en-Santa-Fe/main/Informes/Logo%20Comunidad_Con%20Fondo%20Morado.jpg.jpeg" alt="Logo" class="placa-logo-small">
            <div class="placa-creditos">No era la casta, eras vos</div>
        </div>
    </div>

    <button id="btn-descargar" onclick="descargarPlaca()">Descargar Placa 📸</button>
</div>

<div class="informes-section">
    <h3>¿Querés saber cómo calculamos estos datos? Leé nuestros informes.</h3>
    <div class="informes-grid">
        <div class="informe-card">
            <strong>Informe Tarifas</strong>
            <iframe class="pdf-viewer" src="https://docs.google.com/viewer?url=https://raw.githubusercontent.com/nicolovaisa/Lo-que-cuesta-vivir-en-Santa-Fe/main/Informes/Informe%20Tarifas.pdf&embedded=true"></iframe>
            <a href="https://raw.githubusercontent.com/nicolovaisa/Lo-que-cuesta-vivir-en-Santa-Fe/main/Informes/Informe%20Tarifas.pdf" target="_blank" class="btn-download">Descargar PDF</a>
        </div>
        <div class="informe-card">
            <strong>Informe Prepagas</strong>
            <iframe class="pdf-viewer" src="https://docs.google.com/viewer?url=https://raw.githubusercontent.com/nicolovaisa/Lo-que-cuesta-vivir-en-Santa-Fe/main/Informes/Informe%20Prepagas%20y%20Medicamentos.pdf&embedded=true"></iframe>
            <a href="https://raw.githubusercontent.com/nicolovaisa/Lo-que-cuesta-vivir-en-Santa-Fe/main/Informes/Informe%20Prepagas%20y%20Medicamentos.pdf" target="_blank" class="btn-download">Descargar PDF</a>
        </div>
        <div class="informe-card">
            <strong>Informe Alquileres</strong>
            <iframe class="pdf-viewer" src="https://docs.google.com/viewer?url=https://raw.githubusercontent.com/nicolovaisa/Lo-que-cuesta-vivir-en-Santa-Fe/main/Informes/Informe%20Alquileres%20COMUNIDAD.pdf&embedded=true"></iframe>
            <a href="https://raw.githubusercontent.com/nicolovaisa/Lo-que-cuesta-vivir-en-Santa-Fe/main/Informes/Informe%20Alquileres%20COMUNIDAD.pdf" target="_blank" class="btn-download">Descargar PDF</a>
        </div>
    </div>
</div>

<script>
    const formato = new Intl.NumberFormat('es-AR', { style: 'currency', currency: 'ARS', maximumFractionDigits: 0 });

    function formatearMonto(input) {
        let valor = input.value.replace(/\D/g, "");
        valor = valor.replace(/\B(?=(\d{3})+(?!\d))/g, ".");
        input.value = valor;
    }

    function calcular() {
        const ingresoLimpio = document.getElementById('ingreso').value.replace(/\./g, "");
        const ingreso = parseFloat(ingresoLimpio) || 0;
        const tarifasInput = document.getElementById('tarifas').value;
        if (ingreso <= 0 || tarifasInput === "") { alert("Ingresa tus ingresos mensualmente."); return; }
        const gastos = parseFloat(document.getElementById('alquiler').value) + parseFloat(tarifasInput) + parseFloat(document.getElementById('prepaga').value) + ((parseFloat(document.getElementById('nafta').value) || 0) * 1850) + ((parseFloat(document.getElementById('colectivo').value) || 0) * 1720);
        const saldo = ingreso - gastos;
        const porc = (saldo / ingreso) * 100;
        document.getElementById('placa-resultado').style.display = 'block';
        document.getElementById('btn-descargar').style.display = 'block';
        if (saldo >= 0) {
            document.getElementById('placa-titulo').innerText = "Te quedan";
            document.getElementById('placa-monto').innerText = formato.format(saldo);
            document.getElementById('placa-porc').innerText = "Te queda el " + porc.toFixed(1) + "% de tus ingresos";
        } else {
            document.getElementById('placa-titulo').innerText = "Déficit mensual";
            document.getElementById('placa-monto').innerText = formato.format(Math.abs(saldo));
            document.getElementById('placa-porc').innerText = "Tus gastos superan tus ingresos en un " + Math.abs(porc).toFixed(1) + "%";
        }
        document.getElementById('placa-resultado').scrollIntoView({ behavior: 'smooth' });
    }

    function descargarPlaca() {
        const placa = document.getElementById('placa-resultado');
        html2canvas(placa, { scale: 2, useCORS: true }).then(canvas => {
            const link = document.createElement('a');
            link.download = 'mi-presupuesto-comunidad.png';
            link.href = canvas.toDataURL("image/png");
            link.click();
        });
    }
</script>
</body>
</html>
