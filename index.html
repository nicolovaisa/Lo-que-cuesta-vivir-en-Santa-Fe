<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- CONFIGURACIÓN PARA WHATSAPP / REDES -->
    <title>Comunidad | Santa Fe</title>
    
    <meta property="og:title" content="Comunidad">
    <meta property="og:description" content="*Trabajar cada vez más para vivir cada vez peor.* Diseñamos una herramienta para calcular cuánto queda de ingresos después de pagar alquiler y servicios básicos. No era la casta, eras vos.">
    <meta property="og:image" content="https://raw.githubusercontent.com/comunidadsfe/Lo-que-cuesta-vivir-en-Santa-Fe/main/Informes/placa.png">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://comunidadsfe.github.io/Lo-que-cuesta-vivir-en-Santa-Fe/">
    
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:image" content="https://raw.githubusercontent.com/comunidadsfe/Lo-que-cuesta-vivir-en-Santa-Fe/main/Informes/placa.png">

    <!-- Icono de la pestaña -->
    <link rel="icon" type="image/jpeg" href="Informes/logo.jpg">

    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    
    <style>
        :root {
            --comunidad-violeta: #3D1488;
            --comunidad-fucsia: #EF3C6B;
            --bg-page: var(--comunidad-violeta);
            --bg-container: #FFFFFF;
        }

        body { 
            font-family: 'Montserrat', sans-serif; 
            background-color: var(--bg-page); 
            padding: 20px; 
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .main-header { text-align: center; margin-bottom: 30px; width: 100%; max-width: 480px; }
        .main-header img { max-width: 150px; height: auto; margin-bottom: 15px; border-radius: 15px; }
        .main-header h1 { color: white; font-weight: 800; text-transform: uppercase; font-size: 1.1rem; margin: 0; }

        .container { 
            max-width: 480px; 
            width: 100%;
            background: var(--bg-container); 
            padding: 35px; 
            border-radius: 25px; 
            box-shadow: 0 20px 50px rgba(0,0,0,0.3); 
            box-sizing: border-box;
            margin-bottom: 40px;
        }

        h2 { text-align: center; color: var(--comunidad-violeta); margin-bottom: 30px; font-weight: 800; text-transform: uppercase; font-size: 1rem; }

        .field { margin-bottom: 20px; }
        label { display: block; font-weight: 600; margin-bottom: 8px; font-size: 14px; color: var(--comunidad-violeta); }
        input, select { width: 100%; padding: 14px; border: 2px solid #e9ecef; border-radius: 12px; font-size: 16px; box-sizing: border-box; font-family: 'Montserrat', sans-serif; }
        
        .button-group { display: flex; gap: 12px; margin-top: 20px; }
        button { flex: 1; padding: 16px; border: none; border-radius: 12px; font-size: 14px; font-weight: 800; cursor: pointer; transition: 0.3s; text-transform: uppercase; font-family: 'Montserrat', sans-serif;}
        .btn-calc { background-color: var(--comunidad-fucsia); color: white; }
        .btn-reset { background-color: #dee2e6; color: #495057; }

        #placa-resultado {
            display: none;
            margin-top: 30px;
            padding: 40px 20px;
            border-radius: 20px;
            text-align: center;
            background-color: var(--comunidad-violeta); 
            color: white;
            border: 5px solid var(--comunidad-fucsia); 
        }
        .placa-monto { font-size: 3rem; font-weight: 800; color: var(--comunidad-fucsia); margin: 10px 0; }
        .placa-footer { 
            margin-top: 30px; 
            border-top: 1px solid rgba(255,255,255,0.2); 
            padding-top: 20px; 
            text-align: center;
        }
        .placa-creditos { text-transform: uppercase; font-weight: 800; font-size: 0.9rem; color: white; }

        .actions-group { display: none; flex-direction: column; gap: 12px; width: 100%; margin-top: 20px; }
        .btn-share { background-color: #25D366; color: white; }
        .btn-download { background-color: var(--comunidad-fucsia); color: white; }

        .section-divider { width: 100%; text-align: center; color: white; margin: 40px 0 20px 0; }
        .section-divider h3 { font-size: 1.1rem; font-weight: 600; padding: 0 15px; }

        .informes-grid { display: flex; gap: 20px; justify-content: center; flex-wrap: wrap; max-width: 1100px; width: 100%; margin-bottom: 60px; }
        .informe-card { background: white; color: var(--comunidad-violeta); padding: 25px; border-radius: 20px; flex: 1; min-width: 280px; max-width: 320px; display: flex; flex-direction: column; align-items: center; box-shadow: 0 10px 25px rgba(0,0,0,0.2); }
        .pdf-viewer { width: 100%; height: 200px; border: 1px solid #ddd; border-radius: 10px; margin-bottom: 15px; }
        .btn-pdf-dl { background: var(--comunidad-fucsia); color: white; text-decoration: none; padding: 12px; border-radius: 10px; font-weight: 800; font-size: 0.75rem; text-transform: uppercase; text-align: center; width: 100%; }

        .social-grid { display: flex; gap: 20px; justify-content: center; flex-wrap: wrap; max-width: 1100px; width: 100%; padding-bottom: 60px; align-items: stretch; }
        .video-container { flex: 1; min-width: 320px; max-width: 400px; background: white; padding: 10px; border-radius: 25px; }
        .follow-container { flex: 1; min-width: 320px; max-width: 400px; background: white; padding: 30px; border-radius: 25px; text-align: center; color: var(--comunidad-violeta); display: flex; flex-direction: column; justify-content: center; align-items: center; }
        
        .btn-instagram { 
            display: inline-block; 
            background: linear-gradient(45deg, #f09433 0%,#e6683c 25%,#dc2743 50%,#cc2366 75%,#bc1888 100%); 
            color: white; 
            text-decoration: none; 
            padding: 18px 30px; 
            border-radius: 50px; 
            font-weight: 800; 
            text-transform: uppercase; 
            width: 100%;
            box-sizing: border-box;
        }
    </style>
</head>
<body>

<header class="main-header">
    <img src="Informes/logo.jpg" alt="Comunidad">
    <h1>¿Cuánto cuesta vivir en Santa Fe?</h1>
</header>

<div class="container">
    <h2>¿Cuánto te queda de tus ingresos?</h2>

    <div class="field">
        <label>Ingresos Mensuales ($)</label>
        <input type="text" id="ingreso" placeholder="Ej: 1.000.000" oninput="formatearMonto(this)">
    </div>

    <div class="field">
        <label>Alquiler</label>
        <select id="alquiler">
            <option value="0">No alquilo / Propio</option>
            <option value="430000">1 ambiente</option>
            <option value="600000">2 ambientes</option>
            <option value="700000">3 ambientes</option>
            <option value="830000">4 ambientes</option>
        </select>
    </div>

    <div class="field">
        <label>Tarifas (Luz, Gas, Agua)</label>
        <select id="tarifas">
            <option value="" disabled selected>Selecciona tu situación</option>
            <option value="141722.99">Con subsidios consumo medio</option>
            <option value="181337.99">Sin subsidios consumo medio</option>
            <option value="186886.99">Con subsidios consumo medio/alto</option>
            <option value="214289.99">Sin subsidios consumo medio/alto</option>
        </select>
    </div>

    <div class="field">
        <label>Prepaga</label>
        <select id="prepaga">
            <option value="0">No tengo / Obra Social</option>
            <option value="106000">Indiv. Económica</option>
            <option value="121916">Indiv. Media</option>
            <option value="144000">Indiv. Alta</option>
            <option value="385454">Fam. Económica</option>
            <option value="500463">Fam. Media</option>
            <option value="764223">Fam. Alta</option>
        </select>
    </div>

    <div class="field">
        <label>Nafta (Litros/Mes)</label>
        <input type="number" id="nafta" placeholder="Cantidad">
    </div>

    <div class="field">
        <label>Colectivo (Boletos/Mes)</label>
        <input type="number" id="colectivo" placeholder="Cantidad">
    </div>

    <div class="button-group">
        <button class="btn-calc" onclick="calcular()">Calcular</button>
        <button class="btn-reset" onclick="location.reload()">Reiniciar</button>
    </div>

    <div id="placa-resultado">
        <div id="placa-titulo" style="font-weight: 800; text-transform: uppercase;"></div>
        <div id="placa-monto" class="placa-monto"></div>
        <div id="placa-porc" style="font-weight: 600; margin-bottom: 20px;"></div>
        <div class="placa-footer">
            <div class="placa-creditos">No era la casta, eras vos</div>
        </div>
    </div>

    <div id="actions-group" class="actions-group">
        <button class="btn-share" onclick="compartirPlaca()">Compartir Resultado 🚀</button>
        <button class="btn-download" onclick="descargarPlaca()">Descargar Placa 📸</button>
    </div>
</div>

<div class="section-divider">
    <h3>¿Cómo calculamos estos datos? Leé nuestros informes</h3>
</div>

<div class="informes-grid">
    <div class="informe-card">
        <strong>Tarifas</strong>
        <iframe class="pdf-viewer" src="https://docs.google.com/viewer?url=https://raw.githubusercontent.com/comunidadsfe/Lo-que-cuesta-vivir-en-Santa-Fe/main/Informes/Informe%20Tarifas.pdf&embedded=true"></iframe>
        <a href="https://raw.githubusercontent.com/comunidadsfe/Lo-que-cuesta-vivir-en-Santa-Fe/main/Informes/Informe%20Tarifas.pdf" target="_blank" class="btn-pdf-dl">Descargar PDF</a>
    </div>
    <div class="informe-card">
        <strong>Prepagas</strong>
        <iframe class="pdf-viewer" src="https://docs.google.com/viewer?url=https://raw.githubusercontent.com/comunidadsfe/Lo-que-cuesta-vivir-en-Santa-Fe/main/Informes/Informe%20Prepagas%20y%20Medicamentos.pdf&embedded=true"></iframe>
        <a href="https://raw.githubusercontent.com/comunidadsfe/Lo-que-cuesta-vivir-en-Santa-Fe/main/Informes/Informe%20Prepagas%20y%20Medicamentos.pdf" target="_blank" class="btn-pdf-dl">Descargar PDF</a>
    </div>
    <div class="informe-card">
        <strong>Alquileres</strong>
        <iframe class="pdf-viewer" src="https://docs.google.com/viewer?url=https://raw.githubusercontent.com/comunidadsfe/Lo-que-cuesta-vivir-en-Santa-Fe/main/Informes/Informe%20Alquileres%20COMUNIDAD.pdf&embedded=true"></iframe>
        <a href="https://raw.githubusercontent.com/comunidadsfe/Lo-que-cuesta-vivir-en-Santa-Fe/main/Informes/Informe%20Alquileres%20COMUNIDAD.pdf" target="_blank" class="btn-pdf-dl">Descargar PDF</a>
    </div>
</div>

<div class="social-grid">
    <div class="video-container">
        <blockquote class="instagram-media" data-instgrm-permalink="https://www.instagram.com/reel/DYCoSovxFdJ/" data-instgrm-version="14" style="width:100%; margin:0;"></blockquote>
    </div>
    <div class="follow-container">
        <h4 style="font-weight: 800; text-transform: uppercase; margin-bottom: 20px;">Sumate a Comunidad</h4>
        <a href="https://www.instagram.com/comunidadsf" target="_blank" class="btn-instagram">Seguir a @comunidadsf</a>
    </div>
</div>

<script async src="//www.instagram.com/embed.js"></script>
<script>
    const formato = new Intl.NumberFormat('es-AR', { style: 'currency', currency: 'ARS', maximumFractionDigits: 0 });
    
    function formatearMonto(input) {
        let valor = input.value.replace(/\D/g, "");
        valor = valor.replace(/\B(?=(\d{3})+(?!\d))/g, ".");
        input.value = valor;
    }

    function calcular() {
        const ingresoRaw = document.getElementById('ingreso').value.replace(/\./g, "");
        const ingreso = parseFloat(ingresoRaw) || 0;
        const tarifasVal = document.getElementById('tarifas').value;

        if (ingreso <= 0) { alert("Ingresá tus ingresos mensuales."); return; }
        if (tarifasVal === "") { alert("Seleccioná una opción de tarifas."); return; }

        const gastos = parseFloat(document.getElementById('alquiler').value) + 
                       parseFloat(tarifasVal) + 
                       parseFloat(document.getElementById('prepaga').value) + 
                       ((parseFloat(document.getElementById('nafta').value) || 0) * 1850) + 
                       ((parseFloat(document.getElementById('colectivo').value) || 0) * 1720);
        
        const saldo = ingreso - gastos;
        const porc = (saldo / ingreso) * 100;
        
        document.getElementById('placa-resultado').style.display = 'block';
        document.getElementById('actions-group').style.display = 'flex';
        
        if (saldo >= 0) {
            document.getElementById('placa-titulo').innerText = "Te quedan";
            document.getElementById('placa-monto').innerText = formato.format(saldo);
            document.getElementById('placa-porc').innerText = "Te queda el " + porc.toFixed(1) + "% de tus ingresos";
        } else {
            document.getElementById('placa-titulo').innerText = "Déficit mensual";
            document.getElementById('placa-monto').innerText = formato.format(Math.abs(saldo));
            document.getElementById('placa-porc').innerText = "Tus gastos superan tus ingresos en un " + Math.abs(porc).toFixed(1) + "%";
        }
        document.getElementById('placa-resultado').scrollIntoView({ behavior: 'smooth' });
    }

    async function compartirPlaca() {
        const placa = document.getElementById('placa-resultado');
        const canvas = await html2canvas(placa, { scale: 2, useCORS: true });
        canvas.toBlob(async (blob) => {
            const file = new File([blob], 'mi-presupuesto.png', { type: 'image/png' });
            if (navigator.share) {
                try {
                    await navigator.share({
                        files: [file],
                        title: 'Mi Presupuesto Santa Fe',
                        text: 'Mirá cuánto me queda de ingresos según Comunidad.'
                    });
                } catch (err) { console.error("Error al compartir:", err); }
            } else {
                alert("Tu navegador no soporta compartir directamente. ¡Usá el botón de Descargar!");
            }
        });
    }

    function descargarPlaca() {
        const placa = document.getElementById('placa-resultado');
        html2canvas(placa, { scale: 2, useCORS: true }).then(canvas => {
            const link = document.createElement('a');
            link.download = 'mi-presupuesto-comunidad.png';
            link.href = canvas.toDataURL("image/png");
            link.click();
        });
    }
</script>
</body>
</html>
